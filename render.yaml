services:
  - type: web
    name: community-pulse-api
    runtime: python
    pythonVersion: "3.10"
    buildCommand: "cd backend && pip install --only-binary pydantic-core -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: PYTHONUNBUFFERED
        value: "true"
    health:
      path: /health
      checkIntervalSeconds: 30
